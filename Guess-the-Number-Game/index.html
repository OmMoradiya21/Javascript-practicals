<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Guess the Number Game</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <div class="inputDiv">
        <label for="numberInput">Guess the Number:
        </label>
        <input type="number" name="numberInput" id="numberInput" min="1" max="100" placeholder="Enter numer bertween 1-100" title="1-100" value="0" required>
        <button type="button" id="guessBtn">Guess</button>
        </div>
        <div class="attemptsDiv"><p>Attempts: <span id="attempts">0</span></p></div>
        <div>
            <button type="button" id="hintBtn">Show Hint</button>
            <div class="hintContainer" id="hintContainer"></div>
        </div>
        <script src="./script.js" async defer></script>
    </body>
</html>
