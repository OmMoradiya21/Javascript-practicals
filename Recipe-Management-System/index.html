<!doctype html>

<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->

<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Recipe Management System</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!--[if lt IE 7]>
      <p class="browsehappy">
        You are using an <strong>outdated</strong> browser. Please
        <a href="#">upgrade your browser</a> to improve your experience.
      </p>
    <![endif]-->

    <form class="add-recipe-form" id="add-recipe-form">
      <label for="recipe-name">Recipe Name:</label>
      <input
        type="text"
        name="recipeName"
        id="recipe-name"
        class="recipe-name"
        placeholder="Enter Recipe Name"
        required
      />
      <br />
      <label for="recipe-catagory">Recipe Catagory:</label>
      <input
        type="text"
        name="recipeCatagory"
        class="recipe-catagory"
        id="recipe-catagory"
        placeholder="Enter Recipe Catagory"
        required
      />
      <br />
      <label for="recipe-ingredients">Recipe Ingredients:</label>
      <input
        type="text"
        name="recipeIngredients"
        id="recipe-ingredients"
        class="recipe-ingredients"
        placeholder="Enter Recipe Ingredients"
        required
      />
      <br />
      <label for="recipe-description">Recipe Description:</label>
      <textarea
        type="text"
        name="recipeDescription"
        rows="4"
        cols="50"
        id="recipe-description"
        class="recipe-description"
        placeholder="Write your recipe..."
        required
      ></textarea>

      <br />
      <button type="reset" id="resetBtn">Reset</button>
      <button type="submit" id="submitBtn">Add Recipe</button>
    </form>

    <div class="search-container">
      <button id="get-all-recipe-btn">Get All Recipe</button>
      <input
        type="search"
        name="search"
        id="searchField"
        class="search"
        placeholder="Search recipes.."
        required
      />
      <button id="searchBtn">Search</button>
      <div>
        <input
          type="radio"
          name="filter"
          id="searchByName"
          value="recipeName"
          class="searchByName"
          checked
        />
        <label for="searchByName">Name</label>
      </div>
      <div>
        <input
          type="radio"
          name="filter"
          value="recipeCatagory"
          id="searchByCatagory"
          class="searchByCatagory"
        />
        <label for="searchByCatagory">Catagory</label>
      </div>
      <div>
        <input
          type="radio"
          name="filter"
          value="recipeIngredients"
          id="searchByIngredients"
          class="searchByIngredients"
        />
        <label for="searchByIngredients">Ingredients</label>
      </div>
    </div>
    <div class="all-recipe" id="all-recipe"></div>

    <script src="./script.js" async></script>
  </body>
</html>
